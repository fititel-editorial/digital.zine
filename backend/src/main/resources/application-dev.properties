# Local PostgreSQL by default; every value can be overridden via environment variables
#DB
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/digital_zine}
spring.datasource.username=${DATABASE_USERNAME:development}
spring.datasource.password=${DATABASE_PASSWORD:PostgreSQLRildo2008!}

# Verbose SQL logging in dev only
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true