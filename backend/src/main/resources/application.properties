spring.application.name=fititel

# Active profile defaults to dev; override with SPRING_PROFILES_ACTIVE in prod (Render)
spring.profiles.default=dev

# Schema is owned by Flyway - Hibernate only validates it
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

# CORS - origens do frontend permitidas (lista separada por virgulas).
# Em producao (Render) sobrepor com APP_CORS_ALLOWED_ORIGINS = dominio Vercel.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# JWT - segredo HMAC (>= 32 bytes) e duracao do token.
# Em producao (Render) definir sempre JWT_SECRET; o default abaixo e so para dev.
app.jwt.secret=${JWT_SECRET:dev-only-secret-change-me-0123456789-abcdefghijklmnopqrstuvwxyz}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}