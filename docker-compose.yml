services:
  postgres:
    image: postgres:16-alpine
    container_name: fititel-postgres
    environment:
      POSTGRES_DB: fititel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - fititel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fititel"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: fititel-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/fititel
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  fititel_pgdata:
